[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Handle asset files
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# API proxy (optional - for development)
[[redirects]]
  from = "/api/*"
  to = "https://guest-house-backend-gx77.onrender.com/api/:splat"
  status = 200
  force = true

# Health check
[[redirects]]
  from = "/health"
  to = "https://guest-house-backend-gx77.onrender.com/health"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
